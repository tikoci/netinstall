name: build-on-commit

on:
  workflow_dispatch:
# push:
#   paths:
#     - Makefile
#     - '.github/workflows/build-on-commit.yaml'

permissions:
  packages: write
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    -
      name: Install crane
      run: |
        go install github.com/google/go-containerregistry/cmd/crane@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH
    -
      name: Login to registries
      run: |
        crane auth login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
        crane auth login index.docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
    -
      name: Build all platform images
      run: make image
    -
      name: Push to DockerHub
      run: make image-push IMAGE=ammo74/netinstall
    -
      name: Push to GHCR
      run: make image-push IMAGE=ghcr.io/${{ github.repository }}
    -
      name: Update DockerHub description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: ammo74/netinstall
        short-description: "RouterOS /container for running netinstall to flash MikroTik devices on ARM/ARM64/X86"
