# markdownlint configuration — aligned with GitHub rendering
# Reusable baseline: semantic HTML, fenced code, practical prose rules.
# See .markdownlintignore for excluded LLM instruction files.

default: true

# Heading increment — allow skipping levels (e.g., h2 → h4)
MD001: false

# Line length — GitHub renders long lines fine; hard-wrapping prose is impractical
MD013: false

# Duplicate headings — allow in different sections (GitHub auto-suffixes anchors)
MD024:
  siblings_only: true

# Inline HTML — allow semantic elements GitHub renders
MD033:
  allowed_elements:
    # interactive
    - details
    - summary
    # inline semantic
    - kbd
    - mark
    - abbr
    - sub
    - sup
    - ins
    - del
    - s
    - var
    - samp
    - dfn
    - cite
    - q
    - small
    - time
    - ruby
    - rt
    - rp
    - bdo
    - bdi
    - wbr
    # block semantic
    - br
    - dl
    - dt
    - dd
    - figure
    - figcaption
    - caption
    - picture
    - source
    - section

# --- Signal rules --------------------------------------------------------
# These aid greppability, machine-readability, and correct GitHub rendering.
# Most default true; listed explicitly so the config is self-documenting.

# Fenced code language — lang tags are grep-able and provide semantic signal
MD040: true

# Code block style — fenced blocks are explicit, searchable, and lang-taggable
MD046:
  style: fenced

# Code fence style — backticks only; consistent fence markers aid search
MD048:
  style: backtick

# Link fragments — catch broken #anchor references
MD051: true

# Table pipe style — require both leading and trailing pipes
MD055:
  style: leading_and_trailing

# Table column count — mismatched columns silently break GitHub rendering
MD056: true

# Blanks around tables — required for GitHub to render tables at all
MD058: true

# Table column spacing — disable; GitHub renders regardless of spacing
MD060: false
